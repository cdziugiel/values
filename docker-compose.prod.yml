services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      secrets:
        - prod_env

    container_name: humanet-values-web
    restart: unless-stopped

    ports:
      - "3020:3020"

    extra_hosts:
      - "host.docker.internal:host-gateway"
      
    env_file:
      - .env.production

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      HOSTNAME: "0.0.0.0"
      PORT: "3020"

secrets:
  prod_env:
    file: .env.production