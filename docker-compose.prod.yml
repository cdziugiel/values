services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      secrets:
        - prod_env

    container_name: humanet-values-web
    restart: unless-stopped

    env_file:
      - .env.production

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      HOSTNAME: "0.0.0.0"
      PORT: "3020"

    expose:
      - "3020"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # HTTPS — nowa aplikacja HUMANET
      - >-
        traefik.http.routers.humanet-values.rule=
        Host(`dev.humanet.me`) ||
        Host(`values.humanet.me`) ||
        Host(`test.humanet.me`) ||
        Host(`test-values.humanet.me`) ||
        Host(`coachingirekrutacja.humanet.me`)
      - "traefik.http.routers.humanet-values.entrypoints=websecure"
      - "traefik.http.routers.humanet-values.tls=true"
      - "traefik.http.routers.humanet-values.tls.certresolver=myresolver"
      - "traefik.http.routers.humanet-values.service=humanet-values"

      # Port nowej aplikacji
      - "traefik.http.services.humanet-values.loadbalancer.server.port=3020"
      - "traefik.http.services.humanet-values.loadbalancer.server.scheme=http"

      # HTTP → HTTPS
      - >-
        traefik.http.routers.humanet-values-http.rule=
        Host(`dev.humanet.me`) ||
        Host(`values.humanet.me`) ||
        Host(`test.humanet.me`) ||
        Host(`test-values.humanet.me`) ||
        Host(`coachingirekrutacja.humanet.me`)
      - "traefik.http.routers.humanet-values-http.entrypoints=web"
      - "traefik.http.routers.humanet-values-http.middlewares=humanet-values-https"
      - "traefik.http.routers.humanet-values-http.service=noop@internal"

      - "traefik.http.middlewares.humanet-values-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.humanet-values-https.redirectscheme.permanent=true"

secrets:
  prod_env:
    file: .env.production

networks:
  web:
    external: true
    name: web