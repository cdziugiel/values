services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: humanet-values-web
    working_dir: /app
    restart: unless-stopped

    ports:
      - "3020:3020"

    env_file:
      - .env.local

    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"

      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

      # Playwright browser cache inside official image
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    volumes:
      - .:/app
      - humanet_values_node_modules:/app/node_modules
      - humanet_values_next_cache:/app/.next

    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0 --port 3020"

volumes:
  humanet_values_node_modules:
  humanet_values_next_cache: