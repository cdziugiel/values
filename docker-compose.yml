services:
  web:
    image: node:22-alpine
    container_name: humanet-values-web
    working_dir: /app
    restart: unless-stopped

    ports:
      - "3020:3020"

    env_file:
      - .env.local

    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"

      # Hot reload / file watching inside Docker, especially useful on macOS
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    volumes:
      - .:/app
      - humanet_values_node_modules:/app/node_modules
      - humanet_values_next_cache:/app/.next

    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0 --port 3020"

volumes:
  humanet_values_node_modules:
  humanet_values_next_cache: